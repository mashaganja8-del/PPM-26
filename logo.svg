<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1a1a1a" stroke="#d4af37" stroke-width="2"/>
  
  <!-- Piano keyboard base -->
  <rect x="40" y="60" width="120" height="50" fill="#0a0a0a" stroke="#c0c0c0" stroke-width="1" rx="4"/>
  
  <!-- White keys -->
  <rect x="45" y="65" width="12" height="38" fill="#f5f5f5" stroke="#333" stroke-width="0.5"/>
  <rect x="60" y="65" width="12" height="38" fill="#f5f5f5" stroke="#333" stroke-width="0.5"/>
  <rect x="75" y="65" width="12" height="38" fill="#f5f5f5" stroke="#333" stroke-width="0.5"/>
  <rect x="90" y="65" width="12" height="38" fill="#f5f5f5" stroke="#333" stroke-width="0.5"/>
  <rect x="105" y="65" width="12" height="38" fill="#f5f5f5" stroke="#333" stroke-width="0.5"/>
  <rect x="120" y="65" width="12" height="38" fill="#f5f5f5" stroke="#333" stroke-width="0.5"/>
  <rect x="135" y="65" width="12" height="38" fill="#f5f5f5" stroke="#333" stroke-width="0.5"/>
  
  <!-- Black keys -->
  <rect x="54" y="68" width="8" height="25" fill="#1a1a1a" stroke="#222" stroke-width="0.5"/>
  <rect x="69" y="68" width="8" height="25" fill="#1a1a1a" stroke="#222" stroke-width="0.5"/>
  <rect x="98" y="68" width="8" height="25" fill="#1a1a1a" stroke="#222" stroke-width="0.5"/>
  <rect x="113" y="68" width="8" height="25" fill="#1a1a1a" stroke="#222" stroke-width="0.5"/>
  <rect x="128" y="68" width="8" height="25" fill="#1a1a1a" stroke="#222" stroke-width="0.5"/>
  
  <!-- Highlight on pressed key (gold) -->
  <rect x="75" y="65" width="12" height="38" fill="#FFD700" opacity="0.7" stroke="#333" stroke-width="0.5"/>
  
  <!-- Piano name - MASHA -->
  <text x="100" y="135" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#d4af37" text-anchor="middle" letter-spacing="2">MASHA</text>
  
  <!-- Model - PPM 26 -->
  <text x="100" y="155" font-family="Arial, sans-serif" font-size="11" fill="#c0c0c0" text-anchor="middle" letter-spacing="1">PPM 26</text>
  
  <!-- Decorative line -->
  <line x1="50" y1="158" x2="150" y2="158" stroke="#d4af37" stroke-width="1"/>
</svg>
